<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>VENRAS | Enterprise Consulting & Engineering</title>

<style>
:root{
  --primary:#2563eb;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  color:var(--text);
}

/* =========================
   HEADER (FIXED BALANCE)
========================= */

header{
  position:sticky;
  top:0;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  z-index:100;
}

/* 🔥 GRID INSTEAD OF FLEX */
.nav{
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  align-items:center;
  padding:14px 0;
  max-width:1100px;
  margin:auto;
  padding-left:20px;
  padding-right:20px;
}

/* LEFT SLOT (intentional empty balance) */
.nav-left{
  height:1px;
}

/* BRAND CENTER-LEFT OPTICAL POSITION */
.brand{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:800;
  letter-spacing:-0.02em;
}

.brand a{
  display:flex;
  align-items:center;
  gap:14px;
  text-decoration:none;
  color:var(--text);
  font-size:18px;
}

/* 🔥 LOGO REFINED */
.logo{
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
}

/* RIGHT NAV */
.nav-right{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:18px;
}

.nav-right a{
  text-decoration:none;
  color:var(--muted);
  font-weight:500;
}

.nav-right a:hover{
  color:var(--text);
}

/* CTA */
.cta{
  background:#111827;
  color:#fff !important;
  padding:10px 14px;
  border-radius:10px;
  font-weight:600;
}

/* MOBILE */
@media(max-width:768px){
  .nav{
    grid-template-columns:1fr auto;
  }

  .nav-right a:not(.cta){
    display:none;
  }

  .nav-left{display:none}
}
</style>
</head>

<body>

<header>
  <div class="nav">

    <div class="nav-left"></div>

    <!-- BRAND -->
    <div class="brand">
      <a href="#top">

        <div class="logo">
          <svg width="44" height="44" viewBox="0 0 40 40">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#2563eb"/>
                <stop offset="100%" stop-color="#60a5fa"/>
              </linearGradient>
            </defs>

            <path d="M10 10 L20 32 L30 10"
                  stroke="url(#g)"
                  stroke-width="3.4"
                  stroke-linecap="round"
                  fill="none"/>

            <circle cx="10" cy="10" r="2.2" fill="#2563eb"/>
            <circle cx="20" cy="32" r="2.2" fill="#2563eb"/>
            <circle cx="30" cy="10" r="2.2" fill="#2563eb"/>
          </svg>
        </div>

        VENRAS
      </a>
    </div>

    <!-- RIGHT -->
    <div class="nav-right">
      <a href="#advisory">Advisory</a>
      <a href="#architecture">Architecture</a>
      <a href="#delivery">Delivery</a>
      <a class="cta" href="#contact">Contact</a>
    </div>

  </div>
</header>

</body>
</html>
